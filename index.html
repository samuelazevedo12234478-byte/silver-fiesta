<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastreamento de Mão - Abrir YouTube</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body {
            background-color: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        #webcam {
            display: none;
        }
        #canvas {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Definições do Botão do YouTube
        const button = {
            x: 50,          // Posição X (canto esquerdo)
            y: 50,          // Posição Y (topo)
            width: 180,     // Largura
            height: 60,     // Altura
            label: 'YouTube'
        };

        // Variáveis de controle do Timer
        let hoverStartTime = null;
        const hoverDuration = 2000; // 2 segundos em milissegundos
        let progress = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults(onResults);

        const camera = new Camera(video, {
            onFrame: async () => { await hands.send({ image: video }); },
            width: 640, height: 480
        });
        camera.start();

        function onResults(results) {
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Espelhamento para movimentação natural da mão
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

            // Desenhamos o esqueleto da mão primeiro (dentro do contexto espelhado)
            let fingerTipX = null;
            let fingerTipY = null;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                drawNeonHand(landmarks);

                // Landmark 8 é a ponta do indicador
                const indexTip = landmarks[8];
                
                // Como o canvas está espelhado na horizontal, calculamos a posição real na tela:
                fingerTipX = (1 - indexTip.x) * canvas.width;
                fingerTipY = indexTip.y * canvas.height;
            }

            // Restauramos o contexto para desenhar a interface (botão e barra de carregamento) sem espelhar o texto
            ctx.restore();

            drawInterface(fingerTipX, fingerTipY);
        }

        function drawInterface(fingerX, fingerY) {
            let isHovering = false;

            // Verifica se o dedo está dentro do botão
            if (fingerX !== null && fingerY !== null) {
                if (fingerX >= button.x && fingerX <= button.x + button.width &&
                    fingerY >= button.y && fingerY <= button.y + button.height) {
                    isHovering = true;
                }
            }

            // Lógica do Timer de 2 segundos
            if (isHovering) {
                if (!hoverStartTime) {
                    hoverStartTime = Date.now();
                }
                
                const elapsedTime = Date.now() - hoverStartTime;
                progress = Math.min(elapsedTime / hoverDuration, 1);

                if (elapsedTime >= hoverDuration) {
                    // Reset do timer para não abrir infinitamente e redireciona
                    hoverStartTime = null; 
                    progress = 0;
                    window.open('https://www.youtube.com', '_blank');
                }
            } else {
                hoverStartTime = null;
                progress = 0;
            }

            // --- DESENHO DO BOTÃO ---
            // Sombra/Neon do Botão
            ctx.shadowBlur = 15;
            ctx.shadowColor = isHovering ? '#ff0000' : '#cc0000';
            
            // Fundo do botão (Vermelho YouTube)
            ctx.fillStyle = isHovering ? '#ff0000' : '#ff3333';
            ctx.beginPath();
            ctx.roundRect(button.x, button.y, button.width, button.height, 10);
            ctx.fill();

            // Texto do Botão
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(button.label, button.x + button.width / 2, button.y + button.height / 2);

            // --- BARRA DE PROGRESSO (FEEDBACK VISUAL) ---
            if (progress > 0) {
                ctx.fillStyle = '#00ffcc'; // Cor neon idêntica à da sua mão
                ctx.fillRect(button.x, button.y + button.height + 5, button.width * progress, 6);
            }
        }

        function drawNeonHand(landmarks) {
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 4;
            ctx.shadowColor = '#00ffcc';
            ctx.shadowBlur = 8;

            const connections = [
                [0,1], [1,2], [2,3], [3,4],       
                [0,5], [5,6], [6,7], [7,8],       
                [9,10], [10,11], [11,12],         
                [13,14], [14,15], [15,16],        
                [0,17], [17,18], [18,19], [19,20],
                [5,9], [9,13], [13,17]            
            ];

            connections.forEach(([p1, p2]) => {
                ctx.beginPath();
                ctx.moveTo(landmarks[p1].x * canvas.width, landmarks[p1].y * canvas.height);
                ctx.lineTo(landmarks[p2].x * canvas.width, landmarks[p2].y * canvas.height);
                ctx.stroke();
            });

            ctx.shadowBlur = 0;

            landmarks.forEach((pt) => {
                ctx.beginPath();
                ctx.arc(pt.x * canvas.width, pt.y * canvas.height, 5, 0, 2 * Math.PI);
                ctx.fillStyle = '#ff0064';
                ctx.fill();
            });
        }
    </script>
</body>
</html>
