<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo VR - Detector de Mão com Web View Real</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000;
            font-family: Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        #webcam {
            display: none;
        }
        #canvas {
            width: 100%;
            height: 100%;
        }
        /* Botão virtual estilo VR */
        #vr-button {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background: rgba(255, 0, 100, 0.6);
            border: 3px solid #ff0064;
            border-radius: 15px;
            box-shadow: 0 0 20px #ff0064;
            text-shadow: 0 0 5px black;
            pointer-events: none; 
            transition: all 0.3s;
            z-index: 10; 
        }
        /* Contador flutuante */
        #timer-display {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #00ffcc;
            font-weight: bold;
            text-shadow: 0 0 10px #00ffcc;
            display: none;
            z-index: 10;
        }

        /* Web View (iframe) estilizada para VR */
        #virtual-webview {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%; 
            height: 65%; 
            border: 5px solid #00ffcc;
            box-shadow: 0 0 30px #00ffcc;
            border-radius: 15px;
            display: none; /* Começa escondido */
            z-index: 5; 
            background: white; /* Fundo branco enquanto o site carrega */
        }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <div id="vr-button">ABRIR SITE VR</div>
    <div id="timer-display">3</div>

    <iframe id="virtual-webview" src="" frameborder="0" allowfullscreen></iframe>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const vrButton = document.getElementById('vr-button');
        const timerDisplay = document.getElementById('timer-display');
        const virtualWebview = document.getElementById('virtual-webview'); 

        let hoverStartTime = null;
        let isHovering = false;
        const TIME_TO_CLICK = 3000; 
        let isWebviewOpen = false; 

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Configuração do MediaPipe Hands
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        // Ativa a câmera traseira ('environment')
        const camera = new Camera(video, {
            onFrame: async () => {
                await hands.send({ image: video });
            },
            width: 640,
            height: 480,
            facingMode: 'environment' 
        });
        camera.start();

        function onResults(results) {
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

            let fingerX = -1;
            let fingerY = -1;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];

                drawConnections(landmarks);

                for (let i = 0; i < landmarks.length; i++) {
                    const pt = landmarks[i];
                    const x = pt.x * canvas.width;
                    const y = pt.y * canvas.height;

                    ctx.beginPath();
                    ctx.arc(x, y, 6, 0, 2 * Math.PI);
                    ctx.fillStyle = i === 8 ? '#00ffcc' : '#ff0064'; 
                    ctx.fill();
                }

                const indexFingerTip = landmarks[8];
                
                fingerX = indexFingerTip.x * canvas.width;
                fingerY = indexFingerTip.y * canvas.height;

                if (!isWebviewOpen) {
                    checkButtonHover(fingerX, fingerY);
                }
            } else {
                if (!isWebviewOpen) {
                    resetTimer();
                }
            }

            ctx.restore();
        }

        function drawConnections(landmarks) {
            ctx.strokeStyle = 'rgba(0, 255, 200, 0.8)';
            ctx.lineWidth = 4;

            const connections = [
                [0,1], [1,2], [2,3], [3,4],       
                [0,5], [5,6], [6,7], [7,8],       
                [9,10], [10,11], [11,12],         
                [13,14], [14,15], [15,16],        
                [0,17], [17,18], [18,19], [19,20],
                [5,9], [9,13], [13,17]            
            ];

            connections.forEach(([p1, p2]) => {
                const pt1 = landmarks[p1];
                const pt2 = landmarks[p2];
                ctx.beginPath();
                ctx.moveTo(pt1.x * canvas.width, pt1.y * canvas.height);
                ctx.lineTo(pt2.x * canvas.width, pt2.y * canvas.height);
                ctx.stroke();
            });
        }

        function checkButtonHover(fx, fy) {
            const btnRect = vrButton.getBoundingClientRect();

            if (fx >= btnRect.left && fx <= btnRect.right && fy >= btnRect.top && fy <= btnRect.bottom) {
                if (!isHovering) {
                    isHovering = true;
                    hoverStartTime = Date.now();
                    vrButton.style.background = "rgba(0, 255, 200, 0.8)";
                    vrButton.style.borderColor = "#00ffcc";
                    vrButton.style.boxShadow = "0 0 30px #00ffcc";
                    timerDisplay.style.display = "block";
                }

                const elapsedTime = Date.now() - hoverStartTime;
                const timeLeft = Math.ceil((TIME_TO_CLICK - elapsedTime) / 1000);
                
                if (timeLeft >= 0) {
                    timerDisplay.innerText = timeLeft;
                }

                if (elapsedTime >= TIME_TO_CLICK) {
                    resetTimer();
                    openVirtualWebview(); 
                }
            } else {
                resetTimer();
            }
        }

        function resetTimer() {
            isHovering = false;
            hoverStartTime = null;
            vrButton.style.background = "rgba(255, 0, 100, 0.6)";
            vrButton.style.borderColor = "#ff0064";
            vrButton.style.boxShadow = "0 0 20px #ff0064";
            timerDisplay.style.display = "none";
        }

        // Abre a Web View com um site permitido (Ex: Bing)
        function openVirtualWebview() {
            isWebviewOpen = true;
            vrButton.style.display = "none"; 
            
            // Trocado o YouTube pelo Bing, que aceita rodar dentro do iframe de boa!
            virtualWebview.src = "https://www.bing.com"; 
            virtualWebview.style.display = "block"; 
        }
    </script>
</body>
</html>
