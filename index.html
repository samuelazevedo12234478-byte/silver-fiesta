<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botão 3D Estilo Meta Quest 3</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body {
            background-color: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        #webcam {
            display: none;
        }
        #canvas {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #permissionBtn {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            padding: 12px 24px;
            background-color: #00ffcc;
            color: #000;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px #00ffcc;
        }
    </style>
</head>
<body>

    <button id="permissionBtn" onclick="requestOrientationPermission()">Ativar Modo Meta Quest (AR)</button>
    <video id="webcam" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const permissionBtn = document.getElementById('permissionBtn');

        // Configurações do Botão 3D no espaço (retângulo fino com profundidade)
        const button3D = {
            width: 200,
            height: 70,
            depth: 25, // Espessura/profundidade do botão para ver os lados
            label: 'YouTube'
        };

        // Variáveis de orientação (Giroscópio)
        let initialAlpha = null;
        let initialBeta = null;
        let currentAlpha = 0;
        let currentBeta = 0;

        const sensitivity = 18; 

        // Controle do Timer de Toque
        let hoverStartTime = null;
        const hoverDuration = 2000; 
        let progress = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function requestOrientationPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                            permissionBtn.style.display = 'none';
                        }
                    }).catch(console.error);
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                permissionBtn.style.display = 'none';
            }
        }

        function handleOrientation(event) {
            if (initialAlpha === null && event.alpha !== null) {
                initialAlpha = event.alpha;
                initialBeta = event.beta;
            }
            if (initialAlpha !== null) {
                let diffAlpha = event.alpha - initialAlpha;
                if (diffAlpha > 180) diffAlpha -= 360;
                if (diffAlpha < -180) diffAlpha += 360;
                currentAlpha = diffAlpha;
                currentBeta = event.beta - initialBeta;
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults(onResults);

        const camera = new Camera(video, {
            onFrame: async () => { await hands.send({ image: video }); },
            width: 640, height: 480
        });
        camera.start();

        function onResults(results) {
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

            let fingerTipX = null;
            let fingerTipY = null;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                drawNeonHand(landmarks);

                const indexTip = landmarks[8];
                fingerTipX = (1 - indexTip.x) * canvas.width;
                fingerTipY = indexTip.y * canvas.height;
            }

            ctx.restore();
            drawMetaQuestInterface(fingerTipX, fingerTipY);
        }

        function drawMetaQuestInterface(fingerX, fingerY) {
            // Centro da tela como ponto de fuga/perspectiva
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // Deslocamento da posição baseado no giroscópio
            const offsetX = currentAlpha * sensitivity;
            const offsetY = currentBeta * sensitivity;

            // Posição da face FRONTAL do botão
            const frontX = centerX - button3D.width / 2 + offsetX;
            const frontY = centerY - button3D.height / 2 + offsetY;

            // Posição da face TRASEIRA (projeção 3D baseada no ângulo de visão)
            // Quanto mais para o lado o botão vai, mais a face traseira se desloca criando a perspectiva das laterais
            const perspectiveFactor = 0.4; 
            const backX = frontX + (offsetX * perspectiveFactor);
            const backY = frontY + (offsetY * perspectiveFactor);

            // Verifica colisão do indicador apenas com a face frontal (onde você toca)
            let isHovering = false;
            if (fingerX !== null && fingerY !== null) {
                if (fingerX >= frontX && fingerX <= frontX + button3D.width &&
                    fingerY >= frontY && fingerY <= frontY + button3D.height) {
                    isHovering = true;
                }
            }

            // Lógica do Timer
            if (isHovering) {
                if (!hoverStartTime) hoverStartTime = Date.now();
                const elapsedTime = Date.now() - hoverStartTime;
                progress = Math.min(elapsedTime / hoverDuration, 1);

                if (elapsedTime >= hoverDuration) {
                    hoverStartTime = null; 
                    progress = 0;
                    window.open('https://www.youtube.com', '_blank');
                }
            } else {
                hoverStartTime = null;
                progress = 0;
            }

            // Cores baseadas no toque
            const faceColor = isHovering ? '#ff1a1a' : '#cc0000';
            const sideColor = isHovering ? '#990000' : '#800000';
            const topColor = isHovering ? '#cc0000' : '#b30000';

            // --- DESENHO DAS LATERAIS 3D (Extrusão) ---
            
            // Lateral Esquerda ou Direita (depende de onde você olha)
            ctx.fillStyle = sideColor;
            ctx.beginPath();
            ctx.moveTo(backX, backY);
            ctx.lineTo(frontX, frontY);
            ctx.lineTo(frontX, frontY + button3D.height);
            ctx.lineTo(backX, backY + button3D.height);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(backX + button3D.width, backY);
            ctx.lineTo(frontX + button3D.width, frontY);
            ctx.lineTo(frontX + button3D.width, frontY + button3D.height);
            ctx.lineTo(backX + button3D.width, backY + button3D.height);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Face Superior/Inferior
            ctx.fillStyle = topColor;
            ctx.beginPath();
            ctx.moveTo(backX, backY);
            ctx.lineTo(frontX, frontY);
            ctx.lineTo(frontX + button3D.width, frontY);
            ctx.lineTo(backX + button3D.width, backY);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(backX, backY + button3D.height);
            ctx.lineTo(frontX, frontY + button3D.height);
            ctx.lineTo(frontX + button3D.width, frontY + button3D.height);
            ctx.lineTo(backX + button3D.width, backY + button3D.height);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // --- DESENHO DA FACE FRONTAL (Onde fica o texto) ---
            ctx.shadowBlur = isHovering ? 20 : 10;
            ctx.shadowColor = isHovering ? '#ff0000' : '#000000';
            ctx.fillStyle = faceColor;
            ctx.fillRect(frontX, frontY, button3D.width, button3D.height);

            // Borda Neon na face da frente
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(frontX, frontY, button3D.width, button3D.height);

            // Texto centralizado na face frontal
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 22px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(button3D.label, frontX + button3D.width / 2, frontY + button3D.height / 2);

            // Barra de Progresso Espacial seguindo a base frontal do botão
            if (progress > 0) {
                ctx.fillStyle = '#00ffcc';
                ctx.fillRect(frontX, frontY + button3D.height + 8, button3D.width * progress, 5);
            }
        }

        function drawNeonHand(landmarks) {
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 4;
            ctx.shadowColor = '#00ffcc';
            ctx.shadowBlur = 8;

            const connections = [
                [0,1], [1,2], [2,3], [3,4],       
                [0,5], [5,6], [6,7], [7,8],       
                [9,10], [10,11], [11,12],         
                [13,14], [14,15], [15,16],        
                [0,17], [17,18], [18,19], [19,20],
                [5,9], [9,13], [13,17]            
            ];

            connections.forEach(([p1, p2]) => {
                ctx.beginPath();
                ctx.moveTo(landmarks[p1].x * canvas.width, landmarks[p1].y * canvas.height);
                ctx.lineTo(landmarks[p2].x * canvas.width, landmarks[p2].y * canvas.height);
                ctx.stroke();
            });

            ctx.shadowBlur = 0;

            landmarks.forEach((pt) => {
                ctx.beginPath();
                ctx.arc(pt.x * canvas.width, pt.y * canvas.height, 5, 0, 2 * Math.PI);
                ctx.fillStyle = '#ff0064';
                ctx.fill();
            });
        }
    </script>
</body>
</html>
