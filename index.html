<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo VR - Detector de Mão com YouTube View</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000;
            font-family: Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        /* Câmera escondida para usarmos apenas o Canvas desenhado */
        #webcam {
            display: none;
        }
        /* Tela cheia para o jogo */
        #canvas {
            width: 100%;
            height: 100%;
            /* transform: scaleX(-1); <-- REMOVIDO: Não espelhar a câmera traseira */
        }
        /* Botão virtual estilo VR */
        #vr-button {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background: rgba(255, 0, 100, 0.6);
            border: 3px solid #ff0064;
            border-radius: 15px;
            box-shadow: 0 0 20px #ff0064;
            text-shadow: 0 0 5px black;
            pointer-events: none; /* Ignora o clique real do dedo na tela, só aceita o VR */
            transition: all 0.3s;
            z-index: 10; /* Garante que o botão fique na frente de outros elementos */
        }
        /* Contador flutuante */
        #timer-display {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #00ffcc;
            font-weight: bold;
            text-shadow: 0 0 10px #00ffcc;
            display: none;
            z-index: 10;
        }

        /* --- NOVA ESTILIZAÇÃO: Web View (iframe) --- */
        #youtube-view {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; /* Ocupa 80% da largura da tela */
            height: 60%; /* Ocupa 60% da altura da tela */
            border: 5px solid #00ffcc;
            box-shadow: 0 0 30px #00ffcc;
            border-radius: 15px;
            display: none; /* Começa escondido */
            z-index: 5; /* Fica atrás do botão e do contador, mas na frente da câmera */
        }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <div id="vr-button">ABRIR YOUTUBE</div>
    <div id="timer-display">3</div>

    <iframe id="youtube-view" src="" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const vrButton = document.getElementById('vr-button');
        const timerDisplay = document.getElementById('timer-display');
        const youtubeView = document.getElementById('youtube-view'); // --- NOVO REFERÊNCIA ---

        let hoverStartTime = null;
        let isHovering = false;
        const TIME_TO_CLICK = 3000; // 3 segundos em milissegundos
        let isYoutubeOpen = false; // --- NOVA VARIÁVEL DE ESTADO ---

        // Ajusta o tamanho do canvas para preencher a tela do celular
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Configuração do MediaPipe Hands
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        // Ativa a câmera especificando que queremos a TRASEIRA ('environment')
        const camera = new Camera(video, {
            onFrame: async () => {
                await hands.send({ image: video });
            },
            width: 640,
            height: 480,
            facingMode: 'environment' 
        });
        camera.start();

        // Função que processa os pontos da mão na tela
        function onResults(results) {
            // Desenha a imagem da câmera de fundo
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

            let fingerX = -1;
            let fingerY = -1;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];

                // Desenha os "ossos" (linhas conectando as dobradiças)
                drawConnections(landmarks);

                // Desenha os pontos das dobradiças
                for (let i = 0; i < landmarks.length; i++) {
                    const pt = landmarks[i];
                    const x = pt.x * canvas.width;
                    const y = pt.y * canvas.height;

                    ctx.beginPath();
                    ctx.arc(x, y, 6, 0, 2 * Math.PI);
                    ctx.fillStyle = i === 8 ? '#00ffcc' : '#ff0064'; // Dedo indicador fica verde limão
                    ctx.fill();
                }

                // Ponto número 8 é a ponta do Dedo Indicador
                const indexFingerTip = landmarks[8];
                
                // Para câmera traseira, não precisamos inverter o X.
                fingerX = indexFingerTip.x * canvas.width;
                fingerY = indexFingerTip.y * canvas.height;

                // Verifica se o indicador está em cima do botão, apenas se o YouTube não estiver aberto
                if (!isYoutubeOpen) {
                    checkButtonHover(fingerX, fingerY);
                }
            } else {
                if (!isYoutubeOpen) {
                    resetTimer();
                }
            }

            ctx.restore();
        }

        // Função para desenhar as linhas entre os pontos da mão
        function drawConnections(landmarks) {
            ctx.strokeStyle = 'rgba(0, 255, 200, 0.8)';
            ctx.lineWidth = 4;

            // Pares de pontos que se conectam para formar a mão
            const connections = [
                [0,1], [1,2], [2,3], [3,4],       // Polegar
                [0,5], [5,6], [6,7], [7,8],       // Indicador
                [9,10], [10,11], [11,12],         // Médio
                [13,14], [14,15], [15,16],        // Anelar
                [0,17], [17,18], [18,19], [19,20],// Mínimo
                [5,9], [9,13], [13,17]            // Palma
            ];

            connections.forEach(([p1, p2]) => {
                const pt1 = landmarks[p1];
                const pt2 = landmarks[p2];
                ctx.beginPath();
                ctx.moveTo(pt1.x * canvas.width, pt1.y * canvas.height);
                ctx.lineTo(pt2.x * canvas.width, pt2.y * canvas.height);
                ctx.stroke();
            });
        }

        // Função para detectar colisão com o botão virtual
        function checkButtonHover(fx, fy) {
            const btnRect = vrButton.getBoundingClientRect();

            // Vê se a ponta do dedo está dentro do retângulo do botão
            if (fx >= btnRect.left && fx <= btnRect.right && fy >= btnRect.top && fy <= btnRect.bottom) {
                if (!isHovering) {
                    isHovering = true;
                    hoverStartTime = Date.now();
                    vrButton.style.background = "rgba(0, 255, 200, 0.8)";
                    vrButton.style.borderColor = "#00ffcc";
                    vrButton.style.boxShadow = "0 0 30px #00ffcc";
                    timerDisplay.style.display = "block";
                }

                // Calcula o tempo restante
                const elapsedTime = Date.now() - hoverStartTime;
                const timeLeft = Math.ceil((TIME_TO_CLICK - elapsedTime) / 1000);
                
                if (timeLeft >= 0) {
                    timerDisplay.innerText = timeLeft;
                }

                // Se deu os 3 segundos, executa o "clique" VR!
                if (elapsedTime >= TIME_TO_CLICK) {
                    resetTimer();
                    openYoutubeView(); // --- NOVA FUNÇÃO ---
                }
            } else {
                resetTimer();
            }
        }

        // Reseta o jogo se tirar o dedo de cima
        function resetTimer() {
            isHovering = false;
            hoverStartTime = null;
            vrButton.style.background = "rgba(255, 0, 100, 0.6)";
            vrButton.style.borderColor = "#ff0064";
            vrButton.style.boxShadow = "0 0 20px #ff0064";
            timerDisplay.style.display = "none";
        }

        // --- NOVA FUNÇÃO: Abre a Web View do YouTube ---
        function openYoutubeView() {
            isYoutubeOpen = true;
            vrButton.style.display = "none"; // Esconde o botão para não atrapalhar
            // Define o link do YouTube incorporado (embed). Você pode mudar este link se quiser.
            youtubeView.src = "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1"; 
            youtubeView.style.display = "block"; // Mostra o iframe
        }
    </script>
</body>
</html>
