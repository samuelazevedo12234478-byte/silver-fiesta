<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botão AR Flutuante no Espaço</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body {
            background-color: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        #webcam {
            display: none;
        }
        #canvas {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* Botão necessário para pedir permissão dos sensores no iOS */
        #permissionBtn {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            padding: 12px 24px;
            background-color: #00ffcc;
            color: #000;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px #00ffcc;
        }
    </style>
</head>
<body>

    <button id="permissionBtn" onclick="requestOrientationPermission()">Ativar Modo Realidade Aumentada</button>
    <video id="webcam" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const permissionBtn = document.getElementById('permissionBtn');

        // Posição base do botão no centro do mundo virtual
        const buttonWorld = {
            x: 0, 
            y: 0,
            width: 180,
            height: 60,
            label: 'YouTube'
        };

        // Variáveis de orientação do celular (Giroscópio)
        let initialAlpha = null;
        let initialBeta = null;
        let currentAlpha = 0;
        let currentBeta = 0;

        // Sensibilidade do movimento (ajuste se achar que ele move muito ou pouco)
        const sensitivity = 15; 

        // Controle do Timer de Toque
        let hoverStartTime = null;
        const hoverDuration = 2000; 
        let progress = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Centraliza a posição inicial do mundo no meio da tela
            buttonWorld.x = canvas.width / 2 - buttonWorld.width / 2;
            buttonWorld.y = canvas.height / 2 - buttonWorld.height / 2;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- LÓGICA DO GIROSCÓPIO ---
        function requestOrientationPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                // iOS 13+ exige permissão explícita
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                            permissionBtn.style.display = 'none';
                        }
                    })
                    .catch(console.error);
            } else {
                // Android e outros navegadores antigos
                window.addEventListener('deviceorientation', handleOrientation);
                permissionBtn.style.display = 'none';
            }
        }

        function handleOrientation(event) {
            // Guarda a rotação inicial como o "ponto zero" do espaço real
            if (initialAlpha === null && event.alpha !== null) {
                initialAlpha = event.alpha;
                initialBeta = event.beta;
            }

            // Calcula a diferença de rotação de quando você iniciou
            if (initialAlpha !== null) {
                // Direita / Esquerda (Yaw)
                let diffAlpha = event.alpha - initialAlpha;
                if (diffAlpha > 180) diffAlpha -= 360;
                if (diffAlpha < -180) diffAlpha += 360;
                currentAlpha = diffAlpha;

                // Cima / Baixo (Pitch)
                currentBeta = event.beta - initialBeta;
            }
        }

        // --- CONFIGURAÇÃO MEDIAPIPE ---
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults(onResults);

        const camera = new Camera(video, {
            onFrame: async () => { await hands.send({ image: video }); },
            width: 640, height: 480
        });
        camera.start();

        function onResults(results) {
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Espelhamento da câmera de fundo
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

            let fingerTipX = null;
            let fingerTipY = null;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                drawNeonHand(landmarks);

                // Landmark 8 (Ponta do indicador)
                const indexTip = landmarks[8];
                fingerTipX = (1 - indexTip.x) * canvas.width;
                fingerTipY = indexTip.y * canvas.height;
            }

            ctx.restore();

            // Desenhamos a interface que se move com os sensores
            drawARInterface(fingerTipX, fingerTipY);
        }

        function drawARInterface(fingerX, fingerY) {
            // Calcula o deslocamento do botão baseado em como você inclina o telefone
            // Se você virar o celular para a esquerda (alpha positivo), o botão se move para a direita na tela
            const offsetX = currentAlpha * sensitivity;
            const offsetY = currentBeta * sensitivity;

            // Posição final recalculada do botão na tela atual
            const btnX = buttonWorld.x + offsetX;
            const btnY = buttonWorld.y + offsetY;

            let isHovering = false;

            // Verifica colisão do dedo com a nova posição flutuante do botão
            if (fingerX !== null && fingerY !== null) {
                if (fingerX >= btnX && fingerX <= btnX + buttonWorld.width &&
                    fingerY >= btnY && fingerY <= btnY + buttonWorld.height) {
                    isHovering = true;
                }
            }

            // Lógica do Timer
            if (isHovering) {
                if (!hoverStartTime) hoverStartTime = Date.now();
                const elapsedTime = Date.now() - hoverStartTime;
                progress = Math.min(elapsedTime / hoverDuration, 1);

                if (elapsedTime >= hoverDuration) {
                    hoverStartTime = null; 
                    progress = 0;
                    window.open('https://www.youtube.com', '_blank');
                }
            } else {
                hoverStartTime = null;
                progress = 0;
            }

            // --- DESENHO DO BOTÃO FLUTUANTE ---
            ctx.shadowBlur = 15;
            ctx.shadowColor = isHovering ? '#ff0000' : '#cc0000';
            ctx.fillStyle = isHovering ? '#ff0000' : '#ff3333';
            
            ctx.beginPath();
            ctx.roundRect(btnX, btnY, buttonWorld.width, buttonWorld.height, 10);
            ctx.fill();

            // Texto do Botão
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(buttonWorld.label, btnX + buttonWorld.width / 2, btnY + buttonWorld.height / 2);

            // Barra de carregamento neon acompanhando o botão flutuante
            if (progress > 0) {
                ctx.fillStyle = '#00ffcc';
                ctx.fillRect(btnX, btnY + buttonWorld.height + 5, buttonWorld.width * progress, 6);
            }
        }

        function drawNeonHand(landmarks) {
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 4;
            ctx.shadowColor = '#00ffcc';
            ctx.shadowBlur = 8;

            const connections = [
                [0,1], [1,2], [2,3], [3,4],       
                [0,5], [5,6], [6,7], [7,8],       
                [9,10], [10,11], [11,12],         
                [13,14], [14,15], [15,16],        
                [0,17], [17,18], [18,19], [19,20],
                [5,9], [9,13], [13,17]            
            ];

            connections.forEach(([p1, p2]) => {
                ctx.beginPath();
                ctx.moveTo(landmarks[p1].x * canvas.width, landmarks[p1].y * canvas.height);
                ctx.lineTo(landmarks[p2].x * canvas.width, landmarks[p2].y * canvas.height);
                ctx.stroke();
            });

            ctx.shadowBlur = 0;

            landmarks.forEach((pt) => {
                ctx.beginPath();
                ctx.arc(pt.x * canvas.width, pt.y * canvas.height, 5, 0, 2 * Math.PI);
                ctx.fillStyle = '#ff0064';
                ctx.fill();
            });
        }
    </script>
</body>
</html>
